[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Environment variables (configure in Netlify dashboard for production)
# - NEXT_PUBLIC_SUPABASE_URL
# - NEXT_PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - NEXT_PUBLIC_PADDLE_TOKEN
# - PADDLE_API_KEY
# - PADDLE_WEBHOOK_SECRET
# - ADMIN_EMAILS
# - NEXT_PUBLIC_GOOGLE_ANALYTICS_ID

# Webhook route for Paddle
[[redirects]]
  from = "/.netlify/functions/paddle-webhook"
  to = "/.netlify/functions/paddle-webhook"
  status = 200

# Redirect missing legal pages to Next.js routes
[[redirects]]
  from = "/terms.html"
  to = "/terms"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/refund.html"
  to = "/refund"
  status = 301
