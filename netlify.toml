[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Environment variables (configure in Netlify dashboard for production)
# Required for Supabase Auth:
# - NEXT_PUBLIC_SUPABASE_URL
# - NEXT_PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
#
# Required for Paddle Payments:
# - NEXT_PUBLIC_PADDLE_TOKEN
# - NEXT_PUBLIC_PADDLE_PRICE_COINS_50
# - NEXT_PUBLIC_PADDLE_PRICE_COINS_200
# - NEXT_PUBLIC_PADDLE_PRICE_COINS_500
# - NEXT_PUBLIC_PADDLE_PRICE_PRO_MONTHLY
# - PADDLE_API_KEY
# - PADDLE_WEBHOOK_SECRET
# - PADDLE_PRICE_COINS_MAP
#
# Required for OpenAI API Generation:
# - OPENAI_API_KEY
# - OPENAI_MODEL (defaults to gpt-4o-mini if omitted)
#
# Admin & Security:
# - ADMIN_EMAILS (comma-separated list)
#
# Analytics (optional):
# - NEXT_PUBLIC_GOOGLE_ANALYTICS_ID

# Webhook route for Paddle
[[redirects]]
  from = "/.netlify/functions/paddle-webhook"
  to = "/.netlify/functions/paddle-webhook"
  status = 200

# Redirect missing legal pages to Next.js routes
[[redirects]]
  from = "/terms.html"
  to = "/terms"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/refund.html"
  to = "/refund"
  status = 301
